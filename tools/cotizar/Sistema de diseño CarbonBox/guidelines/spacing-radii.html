<!-- @dsCard group="Spacing" viewport="700x150" name="Radios de esquina" subtitle="8 → 14 (cards) → 22 (lg) → 32 → píldora" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-mono); }
  .wrap { padding: 24px 28px; display: flex; gap: 24px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 80px; height: 56px; background: var(--primary-soft); border: 1.5px solid var(--primary-200); }
  .n { font-size: 11px; color: var(--ink); font-weight: 600; }
  .px { font-size: 9px; color: var(--ink-3); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="n">sm</span><span class="px">8px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius)"></div><span class="n">base</span><span class="px">14px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="n">lg</span><span class="px">22px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="n">xl</span><span class="px">32px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:64px"></div><span class="n">pill</span><span class="px">999px</span></div>
  </div>
</body>
</html>
