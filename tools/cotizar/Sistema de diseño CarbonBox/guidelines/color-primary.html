<!-- @dsCard group="Colors" viewport="700x150" name="Primary · azul índigo" subtitle="El azul real del logo CarbonBox — #1620A4, titulares y marca" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { display: flex; padding: 22px 24px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; position: relative; }
  .sw:first-child .chip { border-radius: 10px 0 0 10px; }
  .sw:last-child .chip { border-radius: 0 10px 10px 0; }
  .n { font-size: 11px; font-weight: 600; color: var(--ink); font-family: var(--font-mono); }
  .h { font-size: 10px; color: var(--ink-3); font-family: var(--font-mono); text-transform: uppercase; }
  .star { position: absolute; top: 8px; right: 10px; font-size: 10px; color: #fff; font-weight: 700; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--primary-soft)"></div><span class="n">soft</span><span class="h">#ECEDFB</span></div>
    <div class="sw"><div class="chip" style="background:var(--primary-100)"></div><span class="n">100</span><span class="h">#D8DBF4</span></div>
    <div class="sw"><div class="chip" style="background:var(--primary-200)"></div><span class="n">200</span><span class="h">#B6BBE8</span></div>
    <div class="sw"><div class="chip" style="background:var(--primary)"><span class="star">★</span></div><span class="n">primary</span><span class="h">#1620A4</span></div>
    <div class="sw"><div class="chip" style="background:var(--primary-deep)"></div><span class="n">deep</span><span class="h">#0D1578</span></div>
    <div class="sw"><div class="chip" style="background:var(--primary-glow)"></div><span class="n">glow</span><span class="h">#5E6DE0</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-dark)"></div><span class="n">dark</span><span class="h">#0D1230</span></div>
  </div>
</body>
</html>
