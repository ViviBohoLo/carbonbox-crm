<!-- @dsCard group="Colors" viewport="700x150" name="Neutrales · ink & líneas" subtitle="Ink frío, grises de texto, fondos y bordes" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { display: flex; padding: 22px 24px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 60px; position: relative; }
  .sw:first-child .chip { border-radius: 10px 0 0 10px; }
  .sw:last-child .chip { border-radius: 0 10px 10px 0; }
  .n { font-size: 11px; font-weight: 600; color: var(--ink); font-family: var(--font-mono); }
  .h { font-size: 9.5px; color: var(--ink-3); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><span class="n">ink</span><span class="h">#0F1535</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-2)"></div><span class="n">ink-2</span><span class="h">#4A526E</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-3)"></div><span class="n">ink-3</span><span class="h">#7A82A0</span></div>
    <div class="sw"><div class="chip" style="background:var(--line)"></div><span class="n">line</span><span class="h">#E6E8F2</span></div>
    <div class="sw"><div class="chip" style="background:var(--bg-soft)"></div><span class="n">bg-soft</span><span class="h">#F7F8FC</span></div>
    <div class="sw"><div class="chip" style="background:var(--bg);box-shadow:inset 0 0 0 1px var(--line)"></div><span class="n">bg</span><span class="h">#FFFFFF</span></div>
  </div>
</body>
</html>
