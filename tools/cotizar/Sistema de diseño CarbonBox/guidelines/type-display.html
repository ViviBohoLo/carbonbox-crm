<!-- @dsCard group="Type" viewport="700x200" name="Display & titulares — Poppins" subtitle="Geométrica; 'Carbon' 300 / 'Box' 700. Títulos en navy." -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-display); }
  .wrap { padding: 24px 28px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); width: 110px; flex: none; }
  .d { font-size: 46px; font-weight: 700; color: var(--primary); letter-spacing: -0.03em; line-height: 1; }
  .h2 { font-size: 30px; font-weight: 700; color: var(--primary); letter-spacing: -0.02em; }
  .h3 { font-size: 20px; font-weight: 600; color: var(--primary); }
  em { font-style: normal; color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="spec">Hero · 96/700</span><span class="d">Mide y <em>reduce</em></span></div>
    <div class="row"><span class="spec">H2 · 44/700</span><span class="h2">Una plataforma. <em>Cuatro capacidades.</em></span></div>
    <div class="row"><span class="spec">H3 · 22/600</span><span class="h3">Cálculo de huella de carbono</span></div>
  </div>
</body>
</html>
