<!-- @dsCard group="Spacing" viewport="700x180" name="Elevación" subtitle="Sombras frías base-ink + realces de botón navy/verde" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-soft); font-family: var(--font-mono); }
  .wrap { padding: 30px 28px; display: flex; gap: 26px; align-items: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 90px; height: 56px; background: var(--white); border-radius: 14px; }
  .n { font-size: 11px; color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
    <div class="item"><div class="box" style="background:var(--primary);box-shadow:var(--shadow-btn-primary)"></div><span class="n">btn-primary</span></div>
    <div class="item"><div class="box" style="background:var(--accent);box-shadow:var(--shadow-btn-accent)"></div><span class="n">btn-accent</span></div>
  </div>
</body>
</html>
