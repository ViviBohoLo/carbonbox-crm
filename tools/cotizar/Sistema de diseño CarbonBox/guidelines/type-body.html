<!-- @dsCard group="Type" viewport="700x190" name="Cuerpo & eyebrow — Poppins" subtitle="Lead, body y el eyebrow verde en mayúsculas" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
  .eyebrow { font-family: var(--font-display); font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }
  .lead { font-size: 18px; color: var(--ink-2); line-height: 1.55; max-width: 560px; }
  .body { font-size: 15px; color: var(--ink-2); line-height: 1.6; max-width: 560px; }
</style>
</head>
<body>
  <div class="wrap">
    <div><span class="eyebrow">Nuestra visión</span></div>
    <div><span class="spec">Lead · 18/400 · </span><span class="lead">La plataforma SaaS de huellas de carbono diseñada para empresas latinoamericanas.</span></div>
    <div><span class="spec">Body · 15/400 · </span><span class="body">Datos confiables, expertos certificados y resultados medibles. Del cálculo a la descarbonización, un sistema integrado que crece contigo.</span></div>
  </div>
</body>
</html>
