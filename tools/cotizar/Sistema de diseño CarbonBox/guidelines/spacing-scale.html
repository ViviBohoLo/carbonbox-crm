<!-- @dsCard group="Spacing" viewport="700x150" name="Escala de espaciado" subtitle="Grid base 4px — space-1 → space-16" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-mono); }
  .wrap { padding: 24px 28px; display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--primary); border-radius: 3px; }
  .box { display: flex; align-items: flex-end; height: 70px; }
  .n { font-size: 10px; color: var(--ink); font-weight: 600; }
  .px { font-size: 9px; color: var(--ink-3); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box"><div class="bar" style="width:4px;height:4px"></div></div><span class="n">1</span><span class="px">4</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:8px;height:8px"></div></div><span class="n">2</span><span class="px">8</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:12px;height:12px"></div></div><span class="n">3</span><span class="px">12</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:16px;height:16px"></div></div><span class="n">4</span><span class="px">16</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:24px;height:24px"></div></div><span class="n">6</span><span class="px">24</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:32px;height:32px"></div></div><span class="n">8</span><span class="px">32</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:48px;height:48px"></div></div><span class="n">12</span><span class="px">48</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:64px;height:64px"></div></div><span class="n">16</span><span class="px">64</span></div>
  </div>
</body>
</html>
